{% extends 'base.html' %}
{% block body %}
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Create New User</h1>
    <form action="" method="post" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
            <input type="text" name="username" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-4 focus:ring-blue-100 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
            <input type="email" name="email" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-4 focus:ring-blue-100 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
            <input type="password" name="password" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-4 focus:ring-blue-100 outline-none">
        </div>
        
        <!-- Styled Checkbox Container -->
        <div class="flex items-center space-x-3 p-4 bg-blue-50/50 rounded-xl border border-blue-100">
            <input type="checkbox" name="is_public" id="is_public" checked class="w-5 h-5 text-blue-600 rounded border-gray-300">
            <label for="is_public" class="text-sm font-medium text-blue-900">Make profile public and visible to all</label>
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95">
            Create Account
        </button>
    </form>
</div>
{% endblock %}
