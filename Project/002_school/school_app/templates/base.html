<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>School ERP Navbar</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/css/nav.css">
  <link rel="stylesheet" href="static/css/manage_student.css">
  <link rel="stylesheet" href="static/css/add_student.css">
  <link rel="stylesheet" href="static/css/index.css">
</head>
<body>

<!-- NAVBAR START -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">

    <!-- Logo -->
    <a class="navbar-brand" href="/">School ERP</a>

    <!-- Toggle Button -->
    <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Items -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">

        <!-- Home -->
        <li class="nav-item">
          <a class="nav-link" href="#">Home</a>
        </li>

        <!-- Management Dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            Management
          </a>

          <ul class="dropdown-menu">

            <li><a class="dropdown-item" href="{% url 'mng-student' %}">👨‍🎓 Student Management</a></li>
            <li><a class="dropdown-item" href="{% url 'mng-teacher' %}">👩‍🏫 Teacher Management</a></li>
            <li><a class="dropdown-item" href="{% url 'mng-attendence' %}">📅 Attendance System</a></li>
            <li><a class="dropdown-item" href="{% url 'mng-fees' %}">💰 Fee Management</a></li>
            <li><a class="dropdown-item" href="{% url 'exam-and-result' %}">📝 Exam & Result</a></li>
            <li><a class="dropdown-item" href="{% url 'notice-board' %}">📢 Notice Board</a></li>

          </ul>
        </li>

        <!-- Other Links -->
        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>

      </ul>
    </div>
  </div>
</nav>
<!-- NAVBAR END -->

{% block content %}
{% endblock %}


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
