{% extends 'manage_student.html' %}



{% block student_content %}

<h3 class="mb-4">Add Student</h2>

<form method="POST" class="student-form">
    {% csrf_token %}

    <div class="row g-3">

        <!-- Name -->
        <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <!-- Date of Birth -->
        <div class="col-md-6">
            <label class="form-label">Date of Birth</label>
            <input type="date" name="dob" class="form-control" placeholder="17/02/2002" required>
        </div>
        <!-- Class -->
        <div class="col-md-3">
            <label class="form-label">Class</label>
            <select name="student_class" class="form-control" required>
                <option value="">Select Class</option>
                <option value="1">Class 1</option>
                <option value="2">Class 2</option>
                <option value="3">Class 3</option>
                <option value="4">Class 4</option>
                <option value="5">Class 5</option>
                <option value="6">Class 6</option>
                <option value="7">Class 7</option>
                <option value="8">Class 8</option>
                <option value="9">Class 9</option>
                <option value="10">Class 10</option>
                <option value="11">Class 11</option>
                <option value="12">Class 12</option>
            </select>
        </div>

        <!-- Parent Contact -->
        <div class="col-md-6">
            <label class="form-label">Parent Contact</label>
            <input type="text" name="parent_contact" class="form-control">
        </div>

        <!-- gender selection  -->
        <div class="col-md-3">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-control" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <!-- Email -->
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control">
        </div>

        <!-- Resident Address or permanent address  -->
        <div class="col-md-6">
            <label class="form-label">Address</label>
            <input type="text" name="address" class="form-control">
        </div>

        <!-- Submit -->
        <div class="col-12 mt-3">
            <button type="submit" class="btn btn-success px-4">
                Save Student
            </button>
        </div>

    </div>

</form>

{% endblock %}
