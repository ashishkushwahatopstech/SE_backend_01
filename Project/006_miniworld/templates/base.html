<!DOCTYPE html>
<html>
<head>
    <title>MiniWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="{% url 'index' %}">MiniWorld</a>
    
    <div>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}" class="btn btn-light">Profile</a>
            <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-light">Login</a>
            <a href="{% url 'signup' %}" class="btn btn-success">Signup</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
