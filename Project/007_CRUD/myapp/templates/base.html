<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student CRUD</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        /* Navbar */

        .navbar{
            background-color: #007bff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .navbar a{
            color: white;
            text-decoration: none;
            margin-right: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .navbar a:hover{
            color: yellow;
        }

        /* Table */

        table{
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        thead{
            background-color: #007bff;
            color: white;
        }

        thead th{
            padding: 15px;
            text-align: center;
            font-size: 16px;
        }

        tbody td{
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tbody tr:hover{
            background-color: #f1f1f1;
            transition: 0.3s;
        }

        img{
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #007bff;
        }

        /* Buttons */

        .edit-btn,
        .delete-btn{
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 5px;
            color: white;
            font-size: 14px;
        }

        .edit-btn{
            background-color: #28a745;
        }

        .delete-btn{
            background-color: #dc3545;
        }

        .edit-btn:hover,
        .delete-btn:hover{
            opacity: 0.8;
        }

        td[colspan="7"]{
            color: red;
            font-weight: bold;
            padding: 20px;
        }

    </style>

</head>
<body>

    <div class="navbar">
        <a href="{% url 'students' %}">Home</a>
        <a href="{% url 'add' %}">Add Students</a>
    </div>

    {% block content %}
    {% endblock %}

</body>
</html>
