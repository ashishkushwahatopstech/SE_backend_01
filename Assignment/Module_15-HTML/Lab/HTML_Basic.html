 <!-- Create a simple HTML webpage that includes:
o A header (<header>), footer (<footer>), main section (<main>), and aside section
(<aside>).
o A paragraph with some basic text.
o A list (both ordered and unordered).
o A link that opens in a new tab. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Welcome to My Website</h1>
    </header>


    <!-- Main Section -->
    <main>

        <!-- Paragraph -->
        <p>This is a simple webpage created using HTML5 semantic tags.</p>


        <!-- Ordered List -->
        <h3>Ordered List</h3>
        <ol>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ol>


        <!-- Unordered List -->
        <h3>Unordered List</h3>
        <ul>
            <li>Python</li>
            <li>Java</li>
            <li>C++</li>
        </ul>


        <!-- Link -->
        <h3>Visit Google</h3>
        <a href="https://www.google.com" target="_blank">
            Open Google in New Tab
        </a>

    </main>


    <!-- Aside Section -->
    <aside>
        <p>This is aside section (extra information).</p>
    </aside>

    <!-- Footer -->
    <footer>
        <p>This is Footer © 2026</p>
    </footer>


</body>
</html>
